name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PROJECT_NAME: splendide

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure PostHog
        env:
          POSTHOG_KEY: ${{ vars.POSTHOG_KEY || secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/environments/environment.prod.ts';
          const posthogKey = process.env.POSTHOG_KEY || '';
          const posthogHost = process.env.POSTHOG_HOST || 'https://eu.i.posthog.com';
          let source = fs.readFileSync(path, 'utf8');
          source = source.replace(/posthogKey:\s*['"][^'"]*['"]/, `posthogKey: ${JSON.stringify(posthogKey)}`);
          source = source.replace(/posthogHost:\s*['"][^'"]*['"]/, `posthogHost: ${JSON.stringify(posthogHost)}`);
          fs.writeFileSync(path, source);
          NODE

      - name: Build Angular
        run: npm run build -- --configuration production --base-href "/"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/${{ env.PROJECT_NAME }}/browser

      - id: deployment
        uses: actions/deploy-pages@v4
